<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save the Date</title>
<meta property="og:title" content="Save the Date">
<meta property="og:description" content="Tap to see who's invited">
<meta property="og:type" content="website">
<!-- The preview banner image. MUST be an absolute https URL (not "front.png").
     Replace the address below with your real GitHub Pages URL. -->
<meta property="og:url" content="https://418tyoung.github.io/wedding_cards/">
<meta property="og:image" content="https://418tyoung.github.io/wedding_cards/banner.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Save the date">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Cormorant+Garamond:wght@400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body{ font-family:'Jost', system-ui, sans-serif; padding:2rem 1.2rem; }
  .stage{ perspective:1600px; width:min(420px, 92vw); aspect-ratio:5/7; }
  @media (hover:hover){ .card:hover{ transform:rotateY(180deg); } }

  :root{
    --sage:#5e7a5a;          /* accent */
    --sage-deep:#46583f;     /* headings */
    --ink:#2c352a;           /* body text */
    --paper:#ffffff;         /* card */
    --mist:#8a978a;          /* captions */
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    min-height:100dvh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:1.6rem;
    background:radial-gradient(1200px 760px at 50% -8%, #eef2ea 0%, #dbe3d2 55%, #c6d2b9 100%);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .card{
    position:relative; width:100%; height:100%;
    transform-style:preserve-3d;
    transition:transform .9s cubic-bezier(.2,.8,.2,1);
    cursor:pointer; border-radius:6px;
  }
  .card.is-flipped{ transform:rotateY(180deg); }
  .card:focus-visible{ outline:3px solid var(--sage); outline-offset:8px; }
  .face{
    position:absolute; inset:0;
    backface-visibility:hidden; -webkit-backface-visibility:hidden;
    border-radius:6px; background:var(--paper); color:var(--ink);
    box-shadow:0 26px 55px -22px rgba(54,72,49,.45), 0 8px 22px -14px rgba(54,72,49,.40);
    display:flex; flex-direction:column;
  }
  /* full-bleed image front */
  .front{ overflow:hidden; }
  .front img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:6px; }
  /* white back, sage accents */
  .back{
    transform:rotateY(180deg); background:var(--paper); color:var(--ink);
    text-align:center; align-items:center; padding:2.4rem 2rem;
  }
  .back::after{
    content:""; position:absolute; inset:14px;
    border:1px solid var(--sage); opacity:.55; border-radius:3px; pointer-events:none;
  }
  .eyebrow{
    font-weight:400; letter-spacing:.42em; text-transform:uppercase;
    font-size:.72rem; color:var(--sage); padding-left:.42em;
  }
  .back-title{ font-family:'Fraunces', serif; font-size:1.7rem; color:var(--sage-deep); margin:.2rem 0 1rem; }
  .guests{ flex:1; width:100%; overflow:auto; display:flex; flex-direction:column; gap:.55rem; padding:.2rem .4rem; align-content:start; }
  .guest{
    font-family:'Cormorant Garamond', serif; font-size:1.3rem; line-height:1.2;
    color:var(--ink); padding-bottom:.45rem; border-bottom:1px solid rgba(94,122,90,.28);
  }
  .guest:last-child{ border-bottom:none; }
  .back-foot{ font-weight:300; font-size:.66rem; letter-spacing:.22em; text-transform:uppercase; color:var(--sage); margin-top:1rem; }
  .caption{ font-weight:300; font-size:.78rem; letter-spacing:.04em; color:var(--sage-deep); text-align:center; }
  @media (prefers-reduced-motion:reduce){ .card{ transition:none; } }

</style>
</head>
<body>
  <div class="stage">
    <div class="card" id="card" role="button" tabindex="0"
         aria-label="Save the date card. Activate to see who is invited.">
      <div class="face front"><img src="front.png" alt="Save the date"></div>

      <div class="face back">
        <span class="eyebrow" id="eyebrow">You're Invited</span>
        <h2 class="back-title" id="backTitle">Whoops, something went wrong</h2>
        <div class="guests" id="guests">
          <div class="guest">Message us and we'll let you know</div>
        </div>
        <div class="back-foot" id="backFoot">Formal invitation to follow</div>
      </div>
    </div>
  </div>
  <p class="caption">Tap the card to flip it</p>
<script>
  // ---- Flip behaviour ----
  const card = document.getElementById('card');
  const flip = () => card.classList.toggle('is-flipped');
  card.addEventListener('click', flip);
  card.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flip(); } });

  // ---- Personalise from the URL ----
  // ?to=The Patel Family            -> headline on the back
  // ?guests=Anita Patel|Raj Patel   -> the list of names (separated by | )
  // With neither, the card shows a friendly "something went wrong" state.
  const params = new URLSearchParams(location.search);
  const to = params.get('to');
  const guestsParam = params.get('guests');

  const eyebrow = document.getElementById('eyebrow');
  const title   = document.getElementById('backTitle');
  const list    = document.getElementById('guests');
  const foot    = document.getElementById('backFoot');

  if (!to && !guestsParam) {
    // No name attached: clean fallback, no half-finished invite chrome.
    eyebrow.style.display = 'none';
    foot.style.display = 'none';
    title.textContent = 'Whoops, something went wrong';
    list.innerHTML = '';
    const msg = document.createElement('div');
    msg.className = 'guest';
    msg.textContent = "Message us and we'll let you know";
    list.appendChild(msg);
  } else {
    // Personalised invite.
    eyebrow.style.display = '';
    foot.style.display = '';
    eyebrow.textContent = "You're Invited";
    title.textContent = to || 'Our People';
    if (guestsParam) {
      const names = guestsParam.split('|').map(s => s.trim()).filter(Boolean);
      list.innerHTML = '';
      for (const name of names) {
        const div = document.createElement('div');
        div.className = 'guest';
        div.textContent = name;   // keeps it safe and shows & correctly
        list.appendChild(div);
      }
    }
  }
</script>
</body>
</html>

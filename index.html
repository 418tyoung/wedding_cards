<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hannah &amp; Taylor — Save the Date</title>
<meta property="og:title" content="Hannah & Taylor — Save the Date">
<meta property="og:description" content="Friday 23 July 2027 · Coombe Lodge, Blagdon">
<meta property="og:type" content="website">
<!-- The preview banner image. MUST be an absolute https URL (not "front.png").
     Replace the address below with your real GitHub Pages URL. -->
<meta property="og:url" content="https://418tyoung.github.io/wedding_cards/">
<meta property="og:image" content="https://418tyoung.github.io/wedding_cards/banner.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Save the date">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  body{ font-family:'Cormorant Garamond', Georgia, serif; padding:2rem 1.2rem; }
  .stage{ position:relative; perspective:1600px; width:min(420px, 92vw); aspect-ratio:1240/1748; }
  /* hover the stationary wrapper, never the rotating card -> no oscillation */
  @media (hover:hover){ .stage:hover .card{ transform:rotateY(180deg); } }

  :root{
    --sage:#5e7a5a;          /* accent */
    --sage-deep:#46583f;     /* headings */
    --ink:#2c352a;           /* body text */
    --paper:#ffffff;         /* card */
    --mist:#8a978a;          /* captions */
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    min-height:100dvh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:1.6rem;
    background:radial-gradient(1200px 760px at 50% -8%, #eef2ea 0%, #dbe3d2 55%, #c6d2b9 100%);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  /* a soft light that drifts and breathes behind everything (clearly visible) */
  .bg-glow{ position:fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none; }
  .bg-glow::before{
    content:""; position:absolute; inset:-35%;
    background:radial-gradient(38% 38% at 50% 50%, rgba(255,255,255,.65), rgba(255,255,255,0) 70%);
    animation:floatGlow 7s ease-in-out infinite;
  }
  @keyframes floatGlow{
    0%{   transform:translate(-16%,-12%) scale(1);   }
    50%{  transform:translate(16%, 10%) scale(1.35);  }
    100%{ transform:translate(-16%,-12%) scale(1);   }
  }
  .card{
    position:relative; width:100%; height:100%;
    transform-style:preserve-3d;
    transition:transform .9s cubic-bezier(.2,.8,.2,1);
    cursor:pointer; border-radius:6px;
    will-change:transform;
  }
  .card.is-flipped{ transform:rotateY(180deg); }
  .card:focus-visible{ outline:3px solid var(--sage); outline-offset:8px; }
  .face{
    position:absolute; inset:0;
    backface-visibility:hidden; -webkit-backface-visibility:hidden;
    border-radius:6px; background:var(--paper); color:var(--ink);
    box-shadow:0 26px 55px -22px rgba(54,72,49,.45), 0 8px 22px -14px rgba(54,72,49,.40);
    display:flex; flex-direction:column;
  }
  /* full-bleed image front */
  .front{ overflow:hidden; }
  .front img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:6px; }
  /* white back, sage accents — styled to match the front stationery */
  .back{
    transform:rotateY(180deg); background:var(--paper); color:var(--ink);
    text-align:center; align-items:center; justify-content:flex-start; padding:2.6rem 2.1rem;
  }
  /* top group (You're Invited + family) pinned to top; closing to the bottom */
  .back-top{ display:flex; flex-direction:column; align-items:center; width:100%; }
  /* names fill and centre in the space between top and bottom */
  .guests{ flex:1; width:100%; display:flex; flex-direction:column; justify-content:center; gap:.5rem; padding:.2rem .4rem; }
  /* error / name-only states: centre the whole group instead of spreading */
  .back.centered{ justify-content:center; }
  .back.centered .guests{ flex:0 0 auto; }
  /* double sage keyline drawn in the card's own 105x148 (mm) coordinate system,
     matching the Canva frame: thick line 4mm in @ weight 2, thin line 6mm in @ weight 1 */
  .frame{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  .eyebrow{
    font-family:'Cormorant Garamond', serif; font-weight:600;
    letter-spacing:.34em; text-transform:uppercase; font-size:.86rem;
    color:var(--sage); padding-left:.34em;
  }
  .back-title{
    font-family:'Cormorant Garamond', serif; font-weight:500;
    text-transform:uppercase; letter-spacing:.06em;
    font-size:1.55rem; line-height:1.15; color:var(--sage-deep);
    margin:.35rem 0 1rem;
  }
  .guest{
    font-family:'Cormorant Garamond', serif; font-weight:500;
    font-size:1.45rem; line-height:1.25; color:var(--sage-deep);
  }
  /* closing — the script signature ties it to the front */
  .closing{ margin-top:1rem; display:flex; flex-direction:column; align-items:center; gap:.15rem; }
  .with-love{
    font-family:'Cormorant Garamond', serif; font-weight:600;
    letter-spacing:.3em; text-transform:uppercase; font-size:.6rem; color:var(--sage);
    padding-left:.3em;
  }
  .signature{
    display:block; width:72%; max-width:290px; height:auto;
    margin:.3rem auto .5rem;
  }
  .back-foot{
    font-family:'Cormorant Garamond', serif; font-weight:600;
    font-size:.62rem; letter-spacing:.26em; text-transform:uppercase; color:var(--sage);
    padding-left:.26em;
  }
  .caption{ font-family:'Cormorant Garamond', serif; font-size:.95rem; letter-spacing:.16em; text-transform:uppercase; color:var(--sage-deep); text-align:center; }
  @media (prefers-reduced-motion:reduce){ .card{ transition:none; } .bg-glow::before{ animation:none; } }

  /* ---- Download FAB (corner printer icon that expands on hover) ---- */
  .print-fab{
    position:fixed; bottom:18px; right:18px; z-index:60;
    display:inline-flex; align-items:center; overflow:hidden;
    height:46px; padding:0; border:none; border-radius:999px; cursor:pointer;
    background:#88a482; color:#fff;
    box-shadow:0 6px 18px -6px rgba(54,72,49,.55);
    transition:background .2s ease;
  }
  .print-fab .ico{ flex:0 0 46px; width:46px; height:46px; display:grid; place-items:center; }
  .print-fab .ico svg{ width:20px; height:20px; }
  .print-fab-label{
    max-width:0; opacity:0; white-space:nowrap;
    font-family:'Cormorant Garamond', serif; font-weight:600;
    letter-spacing:.12em; text-transform:uppercase; font-size:.74rem;
    transition:max-width .38s cubic-bezier(.2,.8,.2,1), opacity .3s ease, padding .38s ease;
    padding-right:0;
  }
  .print-fab:hover, .print-fab:focus-visible{ background:var(--sage); outline:none; }
  .print-fab:hover .print-fab-label, .print-fab:focus-visible .print-fab-label{
    max-width:240px; opacity:1; padding-right:1.2em;
  }
  .print-fab[hidden]{ display:none !important; }

  /* ---- Graduation easter-egg FAB (bottom-left) — subtle hat, expands when active ---- */
  .grad-fab{
    position:fixed; bottom:18px; left:18px; z-index:60;
    display:inline-flex; align-items:center; overflow:hidden;
    height:46px; padding:0; border:none; border-radius:999px; cursor:pointer;
    background:transparent; color:var(--sage-deep); box-shadow:none; opacity:.4;
    transition:opacity .25s ease, background .25s ease, box-shadow .25s ease, color .25s ease;
  }
  .grad-fab .ico{ flex:0 0 46px; width:46px; height:46px; display:grid; place-items:center; }
  .grad-fab .ico svg{ width:22px; height:22px; }
  .grad-fab-label{
    max-width:0; opacity:0; white-space:nowrap;
    font-family:'Cormorant Garamond', serif; font-weight:600;
    letter-spacing:.12em; text-transform:uppercase; font-size:.74rem;
    transition:max-width .4s cubic-bezier(.2,.8,.2,1), opacity .3s ease, padding .4s ease;
    padding-right:0;
  }
  .grad-fab:hover{ opacity:.8; }                          /* a little more visible on hover */
  .grad-fab.active{                                       /* full gold pill when on */
    background:#b8924e; color:#fff; opacity:1;
    box-shadow:0 6px 18px -6px rgba(54,72,49,.55);
  }
  .grad-fab.active .grad-fab-label{ max-width:240px; opacity:1; padding-right:1.2em; }

  /* confetti */
  .confetti-piece{
    position:fixed; top:0; left:0; width:9px; height:14px; z-index:80;
    pointer-events:none; will-change:transform, opacity; border-radius:1px;
  }

  /* fast-forward preview overlay */
  .grad-preview{
    position:fixed; left:50%; top:50%; z-index:70;
    transform:translate(-50%,-50%) scale(.92); opacity:0; visibility:hidden;
    display:inline-flex; align-items:center; gap:.55em;
    background:rgba(32,48,32,.94); color:#fff; padding:.62em 1.1em; border-radius:999px;
    font-family:'Cormorant Garamond', serif; font-weight:600;
    letter-spacing:.16em; text-transform:uppercase; font-size:.92rem; white-space:nowrap;
    box-shadow:0 14px 34px -12px rgba(0,0,0,.55);
    transition:opacity .3s ease, transform .3s ease; pointer-events:none;
  }
  .grad-preview.show{ opacity:1; visibility:visible; transform:translate(-50%,-50%) scale(1); }
  .ff-icon{ width:18px; height:18px; color:#cdab6e; }
  .ff-icon.play{ animation:ffPulse .45s linear infinite; }
  @keyframes ffPulse{ 0%{ transform:translateX(-2px); opacity:.7; } 50%{ transform:translateX(2px); opacity:1; } 100%{ transform:translateX(-2px); opacity:.7; } }
  .pv-date{ letter-spacing:.12em; color:#e9e0cf; min-width:6.5em; text-align:left; }

  /* ---- A4 print layout (hidden on screen, shown only when printing) ---- */
  #printSheet{ display:none; }
  .print-back{
    position:relative; width:105mm; height:148mm; background:#fff; color:var(--ink);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:9mm 8mm; overflow:hidden;
  }
  .panel-front img{ display:block; width:105mm; height:148mm; object-fit:cover; }

  @media print{
    @page{ size:A4 portrait; margin:0; }
    html,body{ background:#fff !important; min-height:0; }
    body{ display:block; padding:0; }
    .stage, .caption, .print-fab, .grad-fab, .bg-glow, .grad-preview{ display:none !important; }
    #printSheet{
      display:flex !important; flex-direction:column; align-items:center;
      width:210mm; height:297mm; padding-top:24mm; gap:8mm;
    }
    .sheet-block{ position:relative; display:flex; width:210mm; height:148mm; }
    .panel{ width:105mm; height:148mm; }
    .foldline{
      position:absolute; top:0; bottom:0; left:105mm;
      border-left:.2mm dashed #9aa7ac;
    }
    .print-note{
      font-family:'Cormorant Garamond', serif; font-size:9pt; letter-spacing:.04em;
      color:#9aa7ac; text-align:center;
    }
  }

</style>
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>
  <div class="stage">
    <div class="card" id="card" role="button" tabindex="0"
         aria-label="Save the date card. Activate to see who is invited.">
      <div class="face front"><img src="front.png" alt="Save the date"></div>

      <div class="face back">
        <svg class="frame" viewBox="0 0 105 148" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
          <rect x="4" y="4" width="97" height="140" rx="0.2" ry="0.2" fill="none" stroke="var(--sage)" stroke-width="0.6"/>
          <rect x="6" y="6" width="93" height="136" rx="0.1" ry="0.1" fill="none" stroke="#8da889" stroke-width="0.3"/>
        </svg>
        <div class="back-top">
          <span class="eyebrow" id="eyebrow">You're Invited</span>
          <h2 class="back-title" id="backTitle">Our People</h2>
        </div>
        <div class="guests" id="guests">
          <div class="guest">Eleanor &amp; James Whitfield</div>
          <div class="guest">The Patel Family</div>
          <div class="guest">Marcus Lee</div>
          <div class="guest">Sofia Romano</div>
        </div>
        <div class="closing" id="closing">
          <span class="with-love">With love</span>
          <img class="signature" src="signature.png" alt="Hannah & Taylor">
          <div class="back-foot">Formal invitation to follow</div>
        </div>
      </div>
    </div>
  </div>
  <p class="caption">Tap the card to flip it</p>
  <button type="button" id="downloadBtn" class="print-fab" aria-label="Download printable card">
    <span class="ico" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 9V3h12v6"/>
        <path d="M6 18H4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2"/>
        <rect x="6" y="14" width="12" height="7" rx="1"/>
      </svg>
    </span>
    <span class="print-fab-label">Download printable card</span>
  </button>

  <button type="button" id="gradBtn" class="grad-fab" aria-label="Graduation mode" title="Graduation mode">
    <span class="ico" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.5 9 12 4.8 2.5 9 12 13.2 21.5 9Z"/>
        <path d="M6 11v4.2c0 1.1 2.7 2.3 6 2.3s6-1.2 6-2.3V11"/>
        <path d="M21.5 9v4.4"/>
      </svg>
    </span>
    <span class="grad-fab-label">Graduation mode</span>
  </button>

  <!-- fast-forward "previewing the future" overlay (shown when turning graduation mode on) -->
  <div id="gradPreview" class="grad-preview" aria-hidden="true">
    <svg class="ff-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M4 5l8 7-8 7V5Z"/><path d="M13 5l8 7-8 7V5Z"/>
    </svg>
    <span class="pv-label">Previewing</span>
    <span class="pv-date" id="previewDate">--/--/--</span>
  </div>

  <!-- Print-only A4 layout: front + current back, side by side at true A6 size, fold down the middle -->
  <div id="printSheet" aria-hidden="true">
    <div class="sheet-block">
      <div class="panel print-back" id="printBack"></div>
      <div class="panel panel-front"><img src="front.png" alt="Save the date"></div>
      <div class="foldline"></div>
    </div>
    <p class="print-note">Print at 100% (actual size) · trim to the outer block · fold along the dashed line, printed side out</p>
  </div>
<script>
  // ---- Flip behaviour ----
  const card = document.getElementById('card');
  const flip = () => card.classList.toggle('is-flipped');
  card.addEventListener('click', flip);
  card.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flip(); } });

  // ---- Personalise from the URL ----
  // ?to=The Patel Family            -> headline on the back (required for the invite)
  // ?guests=Anita Patel|Raj Patel   -> optional list of names (separated by | )
  // Rule: a name (to) is required. Guests are optional.
  //   to + guests  -> invite with list
  //   to alone     -> invite, just the name (no list)
  //   no to        -> friendly "something went wrong" state
  const params = new URLSearchParams(location.search);
  const to = params.get('to');
  const guestsParam = params.get('guests');

  const eyebrow = document.getElementById('eyebrow');
  const title   = document.getElementById('backTitle');
  const list    = document.getElementById('guests');
  const closing = document.getElementById('closing');
  const back    = document.querySelector('.face.back');

  if (!to) {
    // No name attached: clean fallback, no half-finished invite chrome.
    eyebrow.style.display = 'none';
    closing.style.display = 'none';
    list.style.display = '';
    back.classList.add('centered');
    title.textContent = 'Whoops, something went wrong';
    list.innerHTML = '';
    const msg = document.createElement('div');
    msg.className = 'guest';
    msg.textContent = "Message us and we'll let you know";
    list.appendChild(msg);
  } else {
    // Personalised invite.
    eyebrow.style.display = '';
    closing.style.display = '';
    eyebrow.textContent = "You're Invited";
    title.textContent = to;
    if (guestsParam) {
      const names = guestsParam.split('|').map(s => s.trim()).filter(Boolean);
      list.style.display = '';
      list.innerHTML = '';
      for (const name of names) {
        const div = document.createElement('div');
        div.className = 'guest';
        div.textContent = name;   // keeps it safe and shows & correctly
        list.appendChild(div);
      }
      back.classList.remove('centered');   // spread: top / names / bottom
    } else {
      // Named invitee, no separate guest list -> just the name.
      list.innerHTML = '';
      list.style.display = 'none';
      back.classList.add('centered');      // no names -> keep it centred
    }
  }

  // ---- Printable A4 version ----
  // Clones the current (personalised) back into the print panel, then opens the
  // print dialog (choose "Save as PDF" to keep a file). Front + back print at
  // true A6 size, ready to fold.
  const frontImg = document.querySelector('.front img');
  const sigImg   = document.querySelector('.signature');
  const downloadBtn = document.getElementById('downloadBtn');
  downloadBtn.addEventListener('click', () => {
    const printBack = document.getElementById('printBack');
    printBack.innerHTML = document.querySelector('.face.back').innerHTML;
    const printFront = document.querySelector('.panel-front img');
    if (printFront) printFront.src = frontImg.getAttribute('src');   // match current mode
    window.print();
  });

  // ---- Graduation mode (easter egg) ----
  const NORMAL = { front: 'front.png',      sig: 'signature.png' };
  const GRAD   = { front: 'front-grad.png', sig: 'signature-grad.png' };
  // preload the graduation images so the swap is instant / flash-free
  [GRAD.front, GRAD.sig].forEach(s => { const i = new Image(); i.src = s; });

  function swapImg(img, newSrc){
    if (img) img.setAttribute('src', newSrc);   // instant swap, no animation
  }

  function confettiBurst(){
    const r = document.querySelector('.stage').getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    const colors = ['#5e7a5a','#8da889','#b8924e','#c6d2b9','#46583f','#ffffff'];
    for (let i = 0; i < 40; i++){
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.background = colors[i % colors.length];
      p.style.left = cx + 'px'; p.style.top = cy + 'px';
      document.body.appendChild(p);
      const ang = Math.random() * Math.PI * 2;
      const spd = 5 + Math.random() * 7;
      let vx = Math.cos(ang) * spd;
      let vy = Math.sin(ang) * spd - (5 + Math.random() * 5);   // upward bias
      let x = 0, y = 0, rot = Math.random() * 360;
      const vr = (Math.random() - 0.5) * 24;
      let life = 0; const maxLife = 60 + Math.random() * 35;
      (function frame(){
        life++; vy += 0.32; x += vx; y += vy; rot += vr;
        p.style.transform = `translate(${x}px, ${y}px) rotate(${rot}deg)`;
        p.style.opacity = String(Math.max(0, 1 - life / maxLife));
        if (life < maxLife) requestAnimationFrame(frame); else p.remove();
      })();
    }
  }

  let gradOn = false, gradBusy = false;
  const gradBtn = document.getElementById('gradBtn');

  // Hannah's graduation date — set this to the real date when known.
  const GRAD_DATE = "circa March 2027";
  const previewEl   = document.getElementById('gradPreview');
  const previewDate = document.getElementById('previewDate');
  const ffIcon      = previewEl.querySelector('.ff-icon');
  const rand2 = () => String(Math.floor(Math.random() * 90) + 10);

  function playPreview(done){
    previewEl.classList.add('show');
    ffIcon.classList.add('play');
    const start = performance.now(), dur = 950;
    (function roll(){
      if (performance.now() - start < dur){
        previewDate.textContent = `${rand2()}/${rand2()}/${rand2()}`;   // fast-forward through dates
        setTimeout(roll, 55);
      } else {
        previewDate.textContent = GRAD_DATE;      // land on the graduation date
        ffIcon.classList.remove('play');
        setTimeout(() => {                        // hold on the date for 1s, then fade out
          previewEl.classList.remove('show');
          setTimeout(() => done && done(), 340);
        }, 1000);
      }
    })();
  }

  gradBtn.addEventListener('click', () => {
    if (gradBusy) return;
    gradOn = !gradOn;
    gradBtn.classList.toggle('active', gradOn);
    document.body.classList.toggle('grad-mode', gradOn);
    if (gradOn){
      gradBusy = true;
      playPreview(() => {                         // fast-forward first...
        swapImg(frontImg, GRAD.front);            // ...then reveal grad images...
        swapImg(sigImg,   GRAD.sig);
        setTimeout(confettiBurst, 180);           // ...and celebrate
        gradBusy = false;
      });
    } else {
      swapImg(frontImg, NORMAL.front);
      swapImg(sigImg,   NORMAL.sig);
    }
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hannah &amp; Taylor — Save the Date</title>
<meta property="og:title" content="Hannah & Taylor — Save the Date">
<meta property="og:description" content="Friday 23 July 2027 · Coombe Lodge, Blagdon">
<meta property="og:type" content="website">
<!-- The preview banner image. MUST be an absolute https URL (not "front.png").
     Replace the address below with your real GitHub Pages URL. -->
<meta property="og:url" content="https://418tyoung.github.io/wedding_cards/">
<meta property="og:image" content="https://418tyoung.github.io/wedding_cards/banner.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Save the date">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  body{ font-family:'Cormorant Garamond', Georgia, serif; padding:2rem 1.2rem; }
  .stage{ position:relative; perspective:1600px; width:min(420px, 92vw); aspect-ratio:1240/1748; }
  /* hover the stationary wrapper, never the rotating card -> no oscillation */
  @media (hover:hover){ .stage:hover .card{ transform:rotateY(180deg); } }

  :root{
    --sage:#5e7a5a;          /* accent */
    --sage-deep:#46583f;     /* headings */
    --ink:#2c352a;           /* body text */
    --paper:#ffffff;         /* card */
    --mist:#8a978a;          /* captions */
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    min-height:100dvh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:1.6rem;
    background:radial-gradient(1200px 760px at 50% -8%, #eef2ea 0%, #dbe3d2 55%, #c6d2b9 100%);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .card{
    position:relative; width:100%; height:100%;
    transform-style:preserve-3d;
    transition:transform .9s cubic-bezier(.2,.8,.2,1);
    cursor:pointer; border-radius:6px;
    will-change:transform;
  }
  .card.is-flipped{ transform:rotateY(180deg); }
  .card:focus-visible{ outline:3px solid var(--sage); outline-offset:8px; }
  .face{
    position:absolute; inset:0;
    backface-visibility:hidden; -webkit-backface-visibility:hidden;
    border-radius:6px; background:var(--paper); color:var(--ink);
    box-shadow:0 26px 55px -22px rgba(54,72,49,.45), 0 8px 22px -14px rgba(54,72,49,.40);
    display:flex; flex-direction:column;
  }
  /* full-bleed image front */
  .front{ overflow:hidden; }
  .front img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:6px; }
  /* white back, sage accents — styled to match the front stationery */
  .back{
    transform:rotateY(180deg); background:var(--paper); color:var(--ink);
    text-align:center; align-items:center; justify-content:center; padding:2.6rem 2.1rem;
  }
  /* double sage keyline, echoing the printed border on the front */
  .back::after{
    content:""; position:absolute; inset:13px;
    border:1.5px solid var(--sage); opacity:.85; border-radius:2px; pointer-events:none;
  }
  .back::before{
    content:""; position:absolute; inset:21px;
    border:1px solid var(--sage); opacity:.55; border-radius:1px; pointer-events:none; z-index:1;
  }
  .eyebrow{
    font-family:'Cormorant Garamond', serif; font-weight:600;
    letter-spacing:.34em; text-transform:uppercase; font-size:.86rem;
    color:var(--sage); padding-left:.34em;
  }
  .back-title{
    font-family:'Cormorant Garamond', serif; font-weight:500;
    text-transform:uppercase; letter-spacing:.06em;
    font-size:1.55rem; line-height:1.15; color:var(--sage-deep);
    margin:.35rem 0 1rem;
  }
  .guests{ width:100%; display:flex; flex-direction:column; gap:.5rem; padding:.2rem .4rem; margin:.2rem 0 .4rem; }
  .guest{
    font-family:'Cormorant Garamond', serif; font-weight:500;
    font-size:1.45rem; line-height:1.25; color:var(--sage-deep);
  }
  /* closing — the script signature ties it to the front */
  .closing{ margin-top:1rem; display:flex; flex-direction:column; align-items:center; gap:.15rem; }
  .with-love{
    font-family:'Cormorant Garamond', serif; font-weight:600;
    letter-spacing:.3em; text-transform:uppercase; font-size:.6rem; color:var(--sage);
    padding-left:.3em;
  }
  .signature{
    display:block; width:72%; max-width:290px; height:auto;
    margin:.3rem auto .5rem;
  }
  .back-foot{
    font-family:'Cormorant Garamond', serif; font-weight:600;
    font-size:.62rem; letter-spacing:.26em; text-transform:uppercase; color:var(--sage);
    padding-left:.26em;
  }
  .caption{ font-family:'Cormorant Garamond', serif; font-size:.95rem; letter-spacing:.16em; text-transform:uppercase; color:var(--sage-deep); text-align:center; }
  @media (prefers-reduced-motion:reduce){ .card{ transition:none; } }

</style>
</head>
<body>
  <div class="stage">
    <div class="card" id="card" role="button" tabindex="0"
         aria-label="Save the date card. Activate to see who is invited.">
      <div class="face front"><img src="front.png" alt="Save the date"></div>

      <div class="face back">
        <span class="eyebrow" id="eyebrow">You're Invited</span>
        <h2 class="back-title" id="backTitle">Our People</h2>
        <div class="guests" id="guests">
          <div class="guest">Eleanor &amp; James Whitfield</div>
          <div class="guest">The Patel Family</div>
          <div class="guest">Marcus Lee</div>
          <div class="guest">Sofia Romano</div>
        </div>
        <div class="closing" id="closing">
          <span class="with-love">With love</span>
          <img class="signature" src="signature.png" alt="Hannah & Taylor">
          <div class="back-foot">Formal invitation to follow</div>
        </div>
      </div>
    </div>
  </div>
  <p class="caption">Tap the card to flip it</p>
<script>
  // ---- Flip behaviour ----
  const card = document.getElementById('card');
  const flip = () => card.classList.toggle('is-flipped');
  card.addEventListener('click', flip);
  card.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flip(); } });

  // ---- Personalise from the URL ----
  // ?to=The Patel Family            -> headline on the back (required for the invite)
  // ?guests=Anita Patel|Raj Patel   -> optional list of names (separated by | )
  // Rule: a name (to) is required. Guests are optional.
  //   to + guests  -> invite with list
  //   to alone     -> invite, just the name (no list)
  //   no to        -> friendly "something went wrong" state
  const params = new URLSearchParams(location.search);
  const to = params.get('to');
  const guestsParam = params.get('guests');

  const eyebrow = document.getElementById('eyebrow');
  const title   = document.getElementById('backTitle');
  const list    = document.getElementById('guests');
  const closing = document.getElementById('closing');

  if (!to) {
    // No name attached: clean fallback, no half-finished invite chrome.
    eyebrow.style.display = 'none';
    closing.style.display = 'none';
    list.style.display = '';
    title.textContent = 'Whoops, something went wrong';
    list.innerHTML = '';
    const msg = document.createElement('div');
    msg.className = 'guest';
    msg.textContent = "Message us and we'll let you know";
    list.appendChild(msg);
  } else {
    // Personalised invite.
    eyebrow.style.display = '';
    closing.style.display = '';
    eyebrow.textContent = "You're Invited";
    title.textContent = to;
    if (guestsParam) {
      const names = guestsParam.split('|').map(s => s.trim()).filter(Boolean);
      list.style.display = '';
      list.innerHTML = '';
      for (const name of names) {
        const div = document.createElement('div');
        div.className = 'guest';
        div.textContent = name;   // keeps it safe and shows & correctly
        list.appendChild(div);
      }
    } else {
      // Named invitee, no separate guest list -> just the name.
      list.innerHTML = '';
      list.style.display = 'none';
    }
  }
</script>
</body>
</html>
